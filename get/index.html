    <style>
        :root {
            --color-bg: #FAFAF7;
            --color-primary: #2B5F4E;
            --color-primary-light: #3A7D66;
            --color-text: #2C2C2C;
            --color-text-secondary: #6B6B6B;
            --color-border: #E5E2DC;
            --color-accent: #C4945A;
            --color-accent-light: #F5EDE2;
            --font-display: 'DM Serif Display', Georgia, serif;
            --font-body: 'DM Sans', -apple-system, sans-serif;
        }
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: var(--font-body);
            color: var(--color-text);
            background: var(--color-bg);
            -webkit-font-smoothing: antialiased;
        }
        .thank-you-main {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-align: center;
            padding: 48px 24px 56px;
            min-height: calc(100vh - 160px);
        }
        .checkmark {
            width: 64px;
            height: 64px;
            background: var(--color-primary);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            margin-bottom: 24px;
            animation: scaleIn 0.4s ease both;
        }
        .checkmark svg { width: 32px; height: 32px; color: #fff; }
        h1 {
            font-family: var(--font-display);
            font-size: 2.2rem;
            color: var(--color-primary);
            margin-bottom: 12px;
            animation: fadeUp 0.5s ease 0.15s both;
        }
        p {
            color: var(--color-text-secondary);
            font-size: 1.1rem;
            margin-bottom: 32px;
            max-width: 420px;
            line-height: 1.6;
            animation: fadeUp 0.5s ease 0.25s both;
        }
        .thank-you-main a {
            display: inline-block;
            background: var(--color-primary);
            color: #fff;
            text-decoration: none;
            padding: 14px 36px;
            border-radius: 8px;
            font-weight: 600;
            font-size: 1rem;
            transition: background 0.2s, transform 0.15s;
            animation: fadeUp 0.5s ease 0.35s both;
        }
        .thank-you-main a:hover { background: var(--color-primary-light); transform: translateY(-1px); }
        @keyframes scaleIn {
            from { opacity: 0; transform: scale(0.5); }
            to { opacity: 1; transform: scale(1); }
        }
        @keyframes fadeUp {
            from { opacity: 0; transform: translateY(16px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
    <script src="/cp-shell.js"></script>
</head>
<body>

  <div id="cp-header"></div>
<main class="thank-you-main">
<div class="checkmark">
        <svg fill="none" stroke="currentColor" stroke-width="3" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M5 13l4 4L19 7"/></svg>
    </div>
    <h1>Thank you!</h1>
    <p>Your message has been received. We'll be in touch shortly.</p>
    <a href="/">Home</a>
</main>

  <div id="cp-footer"></div>

</body>
</html>
