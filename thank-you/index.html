<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="robots" content="noindex, follow">
    <link rel="icon" href="/favicon.ico" type="image/x-icon">
    <link rel="apple-touch-icon" href="/apple-touch-icon.png">
    <link rel="icon" type="image/png" sizes="192x192" href="/icon-192.png">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Thank You — Compass Place</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --color-bg: #FAFAF7;
            --color-primary: #2B5F4E;
            --color-primary-light: #3A7D66;
            --color-text: #2C2C2C;
            --color-text-secondary: #6B6B6B;
            --color-border: #E5E2DC;
            --color-accent: #C4945A;
            --color-accent-light: #F5EDE2;
            --font-display: 'DM Serif Display', Georgia, serif;
            --font-body: 'DM Sans', -apple-system, sans-serif;
        }
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: var(--font-body);
            color: var(--color-text);
            background: var(--color-bg);
            -webkit-font-smoothing: antialiased;
        }
        .thank-you-main {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-align: center;
            padding: 48px 24px 56px;
            min-height: calc(100vh - 160px);
        }
        .checkmark {
            width: 64px;
            height: 64px;
            background: var(--color-primary);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            margin-bottom: 24px;
            animation: scaleIn 0.4s ease both;
        }
        .checkmark svg { width: 32px; height: 32px; color: #fff; }
        h1 {
            font-family: var(--font-display);
            font-size: 2.2rem;
            color: var(--color-primary);
            margin-bottom: 12px;
            animation: fadeUp 0.5s ease 0.15s both;
        }
        p {
            color: var(--color-text-secondary);
            font-size: 1.1rem;
            margin-bottom: 32px;
            max-width: 420px;
            line-height: 1.6;
            animation: fadeUp 0.5s ease 0.25s both;
        }
        .thank-you-main a {
            display: inline-block;
            background: var(--color-primary);
            color: #fff;
            text-decoration: none;
            padding: 14px 36px;
            border-radius: 8px;
            font-weight: 600;
            font-size: 1rem;
            transition: background 0.2s, transform 0.15s;
            animation: fadeUp 0.5s ease 0.35s both;
        }
        .thank-you-main a:hover { background: var(--color-primary-light); transform: translateY(-1px); }
        @keyframes scaleIn {
            from { opacity: 0; transform: scale(0.5); }
            to { opacity: 1; transform: scale(1); }
        }
        @keyframes fadeUp {
            from { opacity: 0; transform: translateY(16px); }
            to { opacity: 1; transform: translateY(0); }
        }
    
/* Compass Place canonical shared shell */
:root {
  --primary: #2b5f4e;
  --primary-light: #3a7d66;
  --text: #2c2c2c;
  --text-secondary: #6b6b6b;
  --border: #e5e2dc;
}
.cp-shell-header,
.cp-shell-footer {
  box-sizing: border-box;
  font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif !important;
}
.cp-shell-header *,
.cp-shell-footer * {
  box-sizing: border-box;
  font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif !important;
}
.cp-shell-header {
  position: sticky;
  top: 0;
  z-index: 1000;
  width: 100%;
  background: #ffffff;
  border-bottom: 1px solid var(--border);
  backdrop-filter: blur(10px);
  -webkit-backdrop-filter: blur(10px);
}
.cp-shell-footer {
  width: 100%;
  background: #ffffff;
  border-top: 1px solid var(--border);
  margin-top: 12px;
}
.cp-shell-inner {
  width: min(1160px, calc(100% - 32px));
  margin: 0 auto;
}
.cp-shell-header .cp-shell-inner {
  padding: 18px 0;
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 18px;
}
.cp-shell-brand,
.cp-shell-brand:link,
.cp-shell-brand:visited {
  display: inline-block;
  color: var(--primary) !important;
  text-decoration: none !important;
  font-size: 1.44rem !important;
  font-weight: 800 !important;
  line-height: 1.1 !important;
  letter-spacing: -0.02em !important;
}
.cp-shell-nav {
  display: flex;
  flex-wrap: wrap;
  align-items: center;
  gap: 18px;
}
.cp-shell-nav a,
.cp-shell-nav a:link,
.cp-shell-nav a:visited {
  color: var(--text) !important;
  text-decoration: none !important;
  font-size: 0.98rem !important;
  font-weight: 500 !important;
  line-height: 1.2 !important;
}
.cp-shell-nav a:hover { text-decoration: underline !important; }
.cp-shell-nav .cp-shell-cta,
.cp-shell-nav .cp-shell-cta:link,
.cp-shell-nav .cp-shell-cta:visited {
  display: inline-flex;
  align-items: center;
  justify-content: center;
  padding: 10px 14px;
  background: var(--primary) !important;
  color: #ffffff !important;
  border-radius: 999px;
  font-weight: 700 !important;
  line-height: 1 !important;
  text-decoration: none !important;
}
.cp-shell-nav .cp-shell-cta:hover {
  background: var(--primary-light) !important;
  text-decoration: none !important;
}
.cp-shell-footer-inner { padding: 28px 0 40px; }
.cp-shell-tagline {
  margin: 8px 0 0 !important;
  color: var(--text-secondary) !important;
  font-size: 0.95rem !important;
  line-height: 1.5 !important;
}
.cp-shell-footer-links {
  display: flex;
  flex-wrap: wrap;
  gap: 18px;
  margin-top: 10px;
}
.cp-shell-footer-links a,
.cp-shell-footer-links a:link,
.cp-shell-footer-links a:visited {
  color: var(--text-secondary) !important;
  text-decoration: none !important;
  font-size: 0.95rem !important;
  line-height: 1.4 !important;
}
.cp-shell-footer-links a:hover { text-decoration: underline !important; }
/* Hide mobile CTA on desktop — must come BEFORE the media query so mobile can override */
.cp-shell-cta-mobile { display: none; }
@media (max-width: 860px) {
  .cp-shell-header .cp-shell-inner {
    padding: 12px 0;
    flex-wrap: wrap;
    align-items: center;
    row-gap: 0;
  }
  /* Line 1: brand (left) + CTA button (right) */
  /* Button height = 8px top + 8px bottom padding + ~17.6px line-height ≈ 34px */
  .cp-shell-brand { flex: 1 1 auto; line-height: 34px; padding-top: 2px; }
  .cp-shell-cta-mobile {
    display: inline-block;
    background: var(--primary);
    color: #fff !important;
    padding: 8px 14px;
    border-radius: 999px;
    font-weight: 700;
    font-size: 0.92rem;
    text-decoration: none;
    white-space: nowrap;
  }
  .cp-shell-cta-mobile:hover { background: var(--primary-light); text-decoration: none; }
  /* Line 2: the three text links */
  .cp-shell-nav {
    width: 100%;
    gap: 0 20px;
    flex-wrap: nowrap;
    justify-content: flex-start;
    margin-top: 8px;
    padding-bottom: 4px;
  }
  /* Hide desktop CTA inside nav on mobile */
  .cp-shell-nav .cp-shell-cta { display: none; }
}

</style>
</head>
<body>

<header class="cp-shell-header" data-cp-shell="header">
  <div class="cp-shell-inner">
    <a class="cp-shell-brand" href="https://compassplace.com/">Compass Place</a>
    <a class="cp-shell-cta-mobile" href="https://compassplace.com/get/">Get the App</a>
    <nav class="cp-shell-nav" aria-label="Primary">
      <a href="https://compassplace.com/senior-living/">Senior Living</a>
      <a href="https://compassplace.com/resources/">Resources</a>
      <a href="https://compassplace.com/faq/">FAQ</a>
      <a href="https://compassplace.com/get/" class="cp-shell-cta">Get the App</a>
    </nav>
  </div>
</header>
<main class="thank-you-main">
<div class="checkmark">
        <svg fill="none" stroke="currentColor" stroke-width="3" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M5 13l4 4L19 7"/></svg>
    </div>
    <h1>Thank you!</h1>
    <p>Your message has been received. We'll be in touch shortly.</p>
    <a href="/">Home</a>
</main>
<footer class="cp-shell-footer" data-cp-shell="footer">
  <div class="cp-shell-inner cp-shell-footer-inner">
    <div class="cp-shell-brand cp-shell-brand-static">Compass Place</div>
    <p class="cp-shell-tagline">Explore senior living privately, at your own pace.</p>
    <div class="cp-shell-footer-links">
      <a href="https://compassplace.com/">Home</a>
      <a href="https://compassplace.com/senior-living/">Senior Living</a>
      <a href="https://compassplace.com/resources/">Resources</a>
      <a href="https://compassplace.com/faq/">FAQ</a>
      <a href="https://compassplace.com/privacy-policy/">Privacy Policy</a>
      <a href="https://compassplace.com/terms-of-service/">Terms of Service</a>
      <a href="https://compassplace.com/get/">Get the App</a>
    </div>
  </div>
</footer>

</body>
</html>
